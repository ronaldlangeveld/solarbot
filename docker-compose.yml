services:
  app:
    build:
      context: .
    ports:
      - "3123:3123"
    volumes:
      - .:/usr/src/app
      - sqlite-db:/usr/src/app/database
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/usr/src/app/database/app.sqlite
    command: ["bun", "index.js"]
    restart: unless-stopped

volumes:
  sqlite-db: